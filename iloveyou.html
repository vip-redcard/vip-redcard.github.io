  <style>
    /* Nhấp nháy */
    .nhap-nhay {
      animation: flicker 4s linear infinite;
    }

    @keyframes flicker {
      0% {
        opacity: 0.1;
        text-shadow: 0px 0px 29px rgba(242, 22, 22, 1);
      }

      2% {
        opacity: 1;
        text-shadow: 0px 0px 29px rgba(242, 22, 22, 1);
      }

      8% {
        opacity: 0.1;
        text-shadow: 0px 0px 29px rgba(242, 22, 22, 1);
      }

      9% {
        opacity: 1;
        text-shadow: 0px 0px 29px rgba(242, 22, 22, 1);
      }

      12% {
        opacity: 0.1;
        text-shadow: 0px 0px rgba(242, 22, 22, 1);
      }

      20% {
        opacity: 1;
        text-shadow: 0px 0px rgba(242, 22, 22, 1);
      }

      25% {
        opacity: 0.3;
        text-shadow: 0px 0px rgba(242, 22, 22, 1);
      }

      30% {
        opacity: 1;
        text-shadow: 0px 0px rgba(242, 22, 22, 1);
      }

      70% {
        opacity: 0.7;
        text-shadow: 0px 0px rgba(242, 22, 22, 1);
      }

      72% {
        opacity: 0.2;
        text-shadow: 0px 0px rgba(242, 22, 22, 1);
      }

      77% {
        opacity: 0.9;
        text-shadow: 0px 0px rgba(242, 22, 22, 1);
      }

      100% {
        opacity: 0.9;
        text-shadow: 0px 0px rgba(242, 22, 22, 1);
      }
    }

    /* Rung rinh */
    .rung {
      animation: rung-lac 2s ease infinite;
    }

    @-webkit-keyframes rung-lac {
      0% {
        -webkit-transform: rotate(0) scale(1) skew(1deg);
      }

      10% {
        -webkit-transform: rotate(-25deg) scale(1) skew(1deg);
      }

      20% {
        -webkit-transform: rotate(25deg) scale(1) skew(1deg);
      }

      30% {
        -webkit-transform: rotate(-25deg) scale(1) skew(1deg);
      }

      40% {
        -webkit-transform: rotate(25deg) scale(1) skew(1deg);
      }

      50% {
        -webkit-transform: rotate(0) scale(1) skew(1deg);
      }

      100% {
        -webkit-transform: rotate(0) scale(1) skew(1deg);
      }
    }

    /* Hover lên xuống hentryPost home*/
    @keyframes hover {
      50% {
        transform: translateY(-1px);
      }

      100% {
        transform: translateY(-4px);
      }
    }

    article:has(div.postThumbnail) div.postThumbnail {
      display: inline-block;
      transition-duration: 0.5s;
      transition-property: transform;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      transform: translateZ(0);
    }

    article:has(div.postThumbnail) div.postThumbnail:hover {
      transform: translateY(-4px);
      animation: hover 1s linear 0.3s infinite alternate;
      box-shadow: 6px 10px 10px 3px rgb(54 54 54 / 10%);
    }

    /* RTL Mode */
    .rtlMode .headerLeft {
      padding-left: 0;
      padding-right: 25px
    }

    .rtlMode .headerLeft .headerIcon,
    .rtlMode .htmlMenu .link svg,
    .rtlMode .accorIcon {
      margin-right: 0;
      margin-left: 15px
    }

    .rtlMode .headerRight .headerIcon {
      margin-left: 0;
      margin-right: auto
    }

    .rtlMode .headerSearch button {
      left: auto;
      right: 15px
    }

    .rtlMode .headerSearch button.close {
      left: 12px;
      right: auto
    }

    .rtlMode .headerIcon>*:not(:first-child) {
      margin-left: 0;
      margin-right: 12px
    }

    .rtlMode .headerIcon .closeProfile {
      margin: 0
    }

    .rtlMode .headerIcon .navDark i:before {
      left: auto;
      right: 10px
    }

    .rtlMode.darkMode .headerIcon .navDark i:before {
      left: auto;
      right: 3px
    }

    .rtlMode .headerIcon .navDark:before {
      right: auto;
      left: 0
    }

    .rtlMode .headerIcon .navDark:hover:before {
      right: auto;
      top: 1.25rem;
      left: 0.2rem;
    }

    .rtlMode .headerIcon .headerProfile {
      margin: 0;
      left: 0;
      right: auto
    }

    .rtlMode .Profile .profileHeader svg,
    .rtlMode .blogPager .newerLink svg,
    .rtlMode .blogPager .olderLink svg,
    .rtlMode .htmlMenu .close svg,
    .rtlMode .tableOfHeader svg {
      transform: rotate(180deg)
    }

    .rtlMode .mainInner,
    .rtlMode footer {
      margin-left: 0;
      margin-right: var(--nav-width)
    }

    .rtlMode .mainMenu {
      left: auto;
      right: 0;
      border-right: 0;
      border-left: var(--nav-border) solid var(--content-border)
    }

    .rtlMode .htmlMenu .link svg.down {
      margin-right: auto;
      margin-left: 0
    }

    .rtlMode .htmlMenu .link:before,
    .rtlmode .htmlMenu>li li a:before {
      left: auto;
      right: 0
    }

    .rtlMode .htmlMenu>li li a {
      padding: 10px 60px 10px 25px
    }

    .rtlMode #LinkList002 {
      padding: 20px 25px 30px 20px
    }

    .rtlMode #LinkList002 li:first-child {
      margin: 0 0 0 5px
    }

    .rtlMode .navInput:checked~.mainWrapper .mainInner,
    .rtlMode .navInput:checked~.mainWrapper footer {
      margin-left: 0;
      margin-right: 68px
    }

    .rtlMode .blogContent .sidebar {
      padding-left: 0;
      padding-right: 30px
    }

    .rtlMode .postLabel.sponsored svg {
      margin-right: 0;
      margin-left: 5px
    }

    .rtlMode .postComment svg,
    .rtlMode footer .toTop svg,
    .rtlMode .Label li>* svg,
    .rtlMode .post .extLink:after {
      margin-right: 5px;
      margin-left: 0
    }

    .rtlMode .postTimestamp,
    .rtlMode .postMore {
      padding-left: 10px;
      padding-right: 0
    }

    .rtlMode .blogPager .newerLink svg,
    .rtlMode .blogPager .jsLoad svg {
      margin-left: 8px;
      margin-right: 0
    }

    .rtlMode .blogPager .olderLink svg,
    .rtlMode .Label .labelCount,
    .rtlMode .Label .labelShow label:after,
    .rtlMode .breadcrumbs>*:not(:last-child):after {
      margin-left: 0;
      margin-right: 8px
    }

    .rtlMode .itemFeatured .itemContent,
    .rtlMode.listMode .blogPosts .postContent {
      padding-right: 25px;
      padding-left: 0
    }

    .rtlMode .itemPopular .postHeader,
    .rtlMode .itemPopular .postLabel.sponsored {
      margin-left: 0;
      margin-right: 32px
    }

    .rtlMode .Label .cloud .labelName,
    .rtlMode .post .proMarket>a {
      margin: 0 0 8px 8px
    }

    .rtlMode .Label li:nth-child(2n+1) {
      margin-right: 0;
      margin-left: 20px
    }

    .rtlMode .Label li:nth-child(2n+1).labelShow,
    .rtlMode .postComments svg {
      margin: 0
    }

    .rtlMode .Label .labelTitle {
      margin-right: 0;
      margin-left: auto
    }

    .rtlMode footer .creditInner p {
      padding-right: 0;
      padding-left: 20px
    }

    .rtlMode footer .creditInner .creator {
      display: none
    }

    .rtlMode .post .postNav>*:not(:last-child),
    .rtlMode .post .tabsHead>*:not(:last-child),
    .rtlMode .breadcrumbs>*,
    .rtlMode .postComments>*:not(:last-child) {
      margin-right: 0;
      margin-left: 8px
    }

    .rtlMode .post .proInfoL {
      padding-right: 0;
      padding-left: 20px
    }

    .rtlMode .post .proMarket>a:last-of-type {
      margin-left: 0
    }

    .rtlMode .postAuthor,
    .rtlMode .postTimes {
      padding-right: 0;
      padding-left: 15px
    }

    .rtlMode .postAuthorImage,
    .rtlMode .postAuthors .authorImage {
      margin-right: 0;
      margin-left: 12px
    }

    .rtlMode .postTimes svg {
      margin-right: 0;
      margin-left: 6px
    }

    .rtlMode .accordion .content {
      padding-left: 0;
      padding-right: 32px
    }

    .rtlMode .icon {
      margin-right: 0;
      margin-left: 12px
    }

    .rtlMode .buttonInfo>* {
      margin: 0 0 12px 12px
    }

    .rtlMode .buttonInfo>*:last-child {
      margin-left: 0
    }

    @media screen and (max-width: 896px) {
      .rtlMode .headerLeft {
        padding-right: 20px
      }

      .rtlMode .htmlMenu>li li a {
        padding: 10px 55px 10px 20px
      }

      .rtlMode #LinkList002 {
        padding-left: 20px;
        padding-right: 20px;
        margin-left: auto;
        margin-right: -100%;
        border-radius: 0 0 0 15px
      }

      .rtlMode .htmlMenu .close {
        margin-left: auto;
        margin-right: -100%;
        border-radius: 15px 0 0 0
      }

      .rtlMode .mainMenu {
        border-left: 0;
        margin-left: auto;
        margin-right: -100%
      }

      .rtlMode .mainMenu .section {
        border-radius: 15px 0 0 15px
      }

      .rtlMode .navInput:checked~.mainWrapper .mainMenu,
      .rtlMode .navInput:checked~.mainWrapper .htmlMenu .close,
      .rtlMode .navInput:checked~.mainWrapper .mainMenu #LinkList002 {
        margin-left: auto;
        margin-right: 0
      }

      .rtlMode .navInput:checked~.mainWrapper .mainInner,
      .rtlMode .mainInner,
      .rtlMode .navInput:checked~.mainWrapper footer,
      .rtlMode footer {
        margin-right: 0
      }

      .rtlMode .blogContent .sidebar {
        padding: 0
      }
    }

    @media screen and (max-width: 640px) {
      .rtlMode .headerLeft {
        padding-left: 20px
      }

      .rtlMode.listMode .blogPosts .postContent {
        padding-left: 25px;
        padding-right: 0
      }
    }

    @media screen and (max-width: 480px) {
      .rtlMode.onItem .headerIcon a.navMenu {
        left: 0;
        right: -5px;
        margin-right: 0
      }

      .rtlMode.onItem .headerIcon a.navMenu svg {
        transform: rotate(180deg)
      }

      .rtlMode .headerIcon .headerProfile {
        margin: 0 auto auto;
        left: 0;
        right: 0
      }

      .rtlMode .itemFeatured .itemContent {
        padding: 12.5px
      }

      .rtlMode.listMode .blogPosts .postContent {
        padding-left: 20px
      }
    }

    /* Standar CSS */
    *,
    :after,
    :before {
      -webkit-box-sizing: border-box;
      box-sizing: border-box
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      margin: 0;
      font-weight: 700;
      font-family: var(--font-head);
      color: var(--head-color)
    }

    h1 {
      font-size: 1.8rem
    }

    h2 {
      font-size: 1.7rem
    }

    h3 {
      font-size: 1.5rem
    }

    h4 {
      font-size: 1.3rem
    }

    h5 {
      font-size: 1.2rem
    }

    h6 {
      font-size: 1.1rem
    }

    a {
      color: var(--link-color);
      text-decoration: none
    }

    a:hover {
      opacity: .7;
      transition: opacity .15s
    }

    table {
      border-spacing: 0
    }

    iframe {
      max-width: 100%;
      border: 0;
      margin-left: auto;
      margin-right: auto
    }

    input,
    button,
    select,
    textarea {
      font: inherit;
      font-size: 100%;
      color: inherit;
      line-height: normal;
      vertical-align: baseline
    }

    img {
      display: block;
      position: relative;
      max-width: 100%;
      height: auto
    }

    svg {
      width: 22px;
      height: 22px;
      fill: var(--icon-color)
    }

    svg.line,
    svg .line {
      fill: none !important;
      stroke: var(--icon-color);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1
    }

    svg.c-1,
    svg .c-1 {
      fill: var(--icon-alt)
    }

    svg.c-2,
    svg .c-2 {
      fill: var(--icon-sec);
      opacity: .4
    }

    .hidden,
    .replaced {
      display: none
    }

    .invisible {
      visibility: hidden
    }

    .clear {
      width: 100%;
      display: block;
      margin: 0;
      padding: 0;
      float: none;
      clear: both
    }

    .fullClose {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      transition: var(--transition-1);
      background: transparent;
      opacity: 0;
      visibility: hidden
    }

    .free:after,
    .new:after {
      content: 'Free!';
      color: var(--link-color);
      font-size: 85%;
      font-weight: 400;
      margin-left: 5px
    }

    .new:after {
      content: 'New!'
    }

    /* Main Element */
    html {
      scroll-behavior: smooth;
      overflow-x: hidden
    }

    body {
      position: relative;
      margin: 0;
      padding: 0 !important;
      width: 100%;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--body-color);
      background-color: var(--body-bg);
      -webkit-font-smoothing: antialiased;
      word-break: break-word
    }

    .mainWrapper {
      position: relative
    }

    /* Header Notification */
    .notifContent {
      display: flex;
      align-items: center;
      position: relative;
      background-color: var(--notif-bg);
      color: var(--notif-color);
      padding: 10px 25px;
      font-size: 90%;
      line-height: 1.5em;
      transition: var(--transition-1);
      overflow: hidden
    }

    .notifContent label {
      margin-left: auto;
      display: flex;
      align-items: center
    }

    .notifContent label svg.line {
      width: 20px;
      height: 20px;
      stroke: var(--notif-color)
    }

    .notifText {
      width: calc(100% - 20px);
      padding-right: 12px
    }

    .notifInput:checked~.notifContent {
      height: 0;
      padding-top: 0;
      padding-bottom: 0;
      opacity: 0;
      visibility: hidden
    }

    .notifAlt {
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .notifAlt a {
      flex-shrink: 0;
      white-space: nowrap;
      display: block;
      margin-left: 10px;
      padding: 8px 12px;
      border-radius: 3px;
      background-color: #fff;
      font-size: 12px;
      box-shadow: 0 10px 8px -8px rgb(0 0 0 / 12%)
    }

    /* Header Section */
    header {
      width: 100%;
      background-color: var(--header-bg);
      color: var(--header-text);
      z-index: 10;
      transition: var(--transition-1);
      border-bottom: 1px solid var(--content-border);
      position: -webkit-sticky;
      position: sticky;
      top: 0
    }

    header a {
      color: inherit
    }

    header svg {
      width: 20px;
      height: 20px;
      fill: var(--header-icon)
    }

    header svg.line,
    header svg .line {
      fill: none;
      stroke: var(--header-icon)
    }

    .Header {
      margin: auto 0;
      background-repeat: no-repeat;
      background-size: 100%;
      background-position: center
    }

    .Header a {
      display: block
    }

    .Header img {
      max-width: 150px;
      max-height: 45px
    }

    .Header h1,
    .Header h2 {
      display: block;
      font-size: var(--header-title);
      font-weight: 700;
      color: inherit
    }

    .Header .headerTitle {
      max-width: 170px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      display: block
    }

    .headerContent {
      position: relative;
      height: var(--header-height);
      display: flex
    }

    .headerDiv {
      display: flex;
      align-items: center
    }

    .headerLeft {
      padding-left: 25px;
      flex: 0 0 auto;
      width: var(--nav-width)
    }

    .headerLeft .headerIcon {
      margin-right: 15px
    }

    .headerRight {
      padding-left: 25px;
      padding-right: 25px;
      flex: 1 0 auto;
      width: calc(100% - var(--nav-width))
    }

    .headerRight .headerIcon {
      margin-left: auto;
      position: relative
    }

    .headerSearch {
      width: 100%;
      max-width: 550px
    }

    .headerSearch form {
      position: relative;
      width: 100%;
      font-size: 95%
    }

    .headerSearch input[type=text] {
      display: block;
      width: 100%;
      outline: 0;
      border: 0;
      border-radius: 10px;
      background-color: var(--transparent-bg);
      padding: 12px 48px
    }

    .headerSearch input[type=text]:focus~.close {
      opacity: 1;
      visibility: visible
    }

    .headerSearch button {
      background: transparent;
      border: 0;
      outline: 0;
      padding: 0;
      position: absolute;
      left: 15px;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center
    }

    .headerSearch button svg {
      width: 18px;
      height: 18px;
      opacity: .7
    }

    .headerSearch button.close {
      right: 12px;
      left: auto;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition-4)
    }

    .headerSearch button.close svg {
      width: 16px;
      height: 16px
    }

    .headerIcon {
      display: flex;
      align-items: center;
      font-size: 11px
    }

    .headerIcon>* {
      display: flex;
      align-items: center;
      position: relative
    }

    .headerIcon>*:not(:first-child) {
      margin-left: 12px
    }

    .headerIcon label.navMenu:after {
      content: '';
      width: 45px;
      height: 45px;
      display: block;
      background-color: var(--transparent-bg);
      border-radius: 50%;
      position: absolute;
      top: -12.5px;
      left: -12.5px;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition-1);
      transform: scale(.75, .75)
    }

    .headerIcon a.navMenu:after {
      content: attr(data-text);
      opacity: .7;
      margin-left: 8px
    }

    .headerIcon .navMenu:hover:after {
      opacity: 1;
      visibility: visible;
      transform: scale(1, 1)
    }

    .headerIcon .navMenu svg,
    .headerIcon .navMenu .ham {
      display: block;
      transition: var(--transition-2);
      z-index: 2
    }

    .headerIcon .navMenu .svg-2 {
      position: absolute;
      opacity: 0;
      visibility: hidden
    }

    .headerIcon .navMenu .ham {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center
    }

    .headerIcon .navMenu .ham span {
      display: block;
      padding: 0 2px;
      width: inherit;
      opacity: .8
    }

    .headerIcon .navMenu .ham i,
    .headerIcon .navMenu .ham span:before,
    .headerIcon .navMenu .ham span:after {
      content: '';
      display: block;
      width: 100%;
      border-top: 1px solid var(--header-icon)
    }

    .headerIcon .navMenu .ham i {
      margin: 4px 0
    }

    .headerIcon .navSearch,
    .headerIcon a.navMenu {
      display: none
    }

    .headerIcon .navDark i {
      display: flex;
      align-items: center;
      width: 26px;
      height: 18px;
      border-radius: 10px;
      border: 1px solid var(--header-icon);
      opacity: .8
    }

    .headerIcon .navDark i:before {
      content: '';
      display: block;
      position: relative;
      left: 3px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--header-icon);
      transition: var(--transition-1)
    }

    .headerIcon .navDark:before {
      content: attr(data-text);
      opacity: 0;
      transition: var(--transition-2);
      white-space: nowrap;
      position: absolute;
      left: 0
    }

    .headerIcon .navDark:hover:before {
      opacity: .7;
      padding-right: 8px;
      left: 0.2rem;
      top: 1.25rem;
    }

    .headerIcon .headerProfile {
      display: block;
      position: absolute;
      top: -10px;
      right: 0;
      margin: 0;
      width: 250px;
      max-height: 400px;
      background-color: var(--content-bg);
      border: 1px solid var(--content-border);
      border-radius: 8px;
      box-shadow: 0 10px 8px -8px rgb(0 0 0 / 12%);
      transition: var(--transition-1);
      overflow: hidden;
      z-index: 3;
      opacity: 0;
      visibility: hidden;
      font-size: 12px
    }

    .headerIcon .headerProfile ul {
      margin: 0;
      padding: 0;
      list-style: none
    }

    .headerIcon .headerProfile .socialLink {
      padding: 15px 15px;
      border-top: 1px solid var(--content-border)
    }

    .headerIcon .headerProfile .widget:not(:first-child) {
      margin-top: 15px
    }

    .headerIcon .closeProfile {
      display: block;
      position: fixed;
      margin: 0
    }

    .profInput:checked~.mainWrapper .headerIcon .headerProfile {
      opacity: 1;
      visibility: visible;
      top: 0
    }

    .profInput:checked~.mainWrapper .headerIcon .closeProfile {
      opacity: 1;
      visibility: visible
    }

    .navInput:checked~.mainWrapper .headerIcon .navMenu .svg-1 {
      opacity: 0;
      visibility: hidden
    }

    .navInput:checked~.mainWrapper .headerIcon .navMenu .svg-2 {
      opacity: 1;
      visibility: visible
    }

    .darkMode .headerIcon label.navMenu:after,
    .darkMode .headerSearch input[type=text] {
      background-color: rgba(255, 255, 255, .1)
    }

    .darkMode .headerIcon .navDark i,
    .darkMode .headerIcon .navMenu .ham i,
    .darkMode .headerIcon .navMenu .ham span:before,
    .darkMode .headerIcon .navMenu .ham span:after {
      border-color: var(--dark-text)
    }

    .darkMode .headerIcon .navDark i:before {
      left: 10px;
      background-color: var(--dark-text)
    }

    /* Widget Profile */
    .Profile .profileHeader {
      padding: 12px 10px 10px;
      font-size: 12px
    }

    .Profile .profileHeader svg {
      width: 18px;
      height: 18px
    }

    .Profile .profileHeader label {
      display: flex;
      align-items: center
    }

    .Profile .profileHeader label:after {
      content: attr(data-text);
      padding-left: 8px;
      opacity: .7
    }

    .Profile .defaultAvatar {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .Profile .profileImg {
      width: 100%;
      height: 100%;
      background-repeat: no-repeat;
      background-size: 100%;
      background-position: center
    }

    .Profile .team {
      padding: 10px 0;
      overflow-y: auto;
      max-height: 280px
    }

    .Profile .team .profileLink {
      display: flex;
      align-items: center;
      padding: 7px 15px
    }

    .Profile .team .profileLink:hover {
      background-color: var(--transparent-bg)
    }

    .Profile .team .profileImage {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 27px;
      background-color: var(--transparent-bg);
      overflow: hidden
    }

    .Profile .team .profileName {
      flex-grow: 1;
      padding-left: 12px;
      color: inherit;
      font-weight: 600;
      font-family: var(--font-head);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .Profile .team .profileName:after {
      content: 'Author';
      display: block;
      font-weight: 400;
      font-size: 11px;
      font-family: var(--font-body);
      opacity: .7
    }

    .Profile .team li:not(:first-child) .profileName:after {
      content: 'Contributor'
    }

    .Profile .solo {
      padding: 15px;
      text-align: center
    }

    .Profile .solo .profileImage {
      margin: 0 auto 10px;
      width: 60px;
      height: 60px;
      border-radius: 30px;
      background-color: var(--transparent-bg);
      overflow: hidden
    }

    .Profile .solo .profileLink {
      display: block;
      color: inherit;
      font-weight: 600;
      font-size: 13px;
      font-family: var(--font-head);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .Profile .solo .profileText {
      opacity: .7;
      line-height: 1.6em
    }

    .Profile .solo .profileData {
      display: inline-flex;
      margin-top: 10px;
      font-size: 12px;
      color: var(--link-color)
    }

    .Profile .solo .profileData:after {
      content: attr(data-text);
      padding-left: 8px
    }

    .Profile .solo .profileData svg {
      width: 18px;
      height: 18px;
      fill: var(--link-color)
    }

    .Profile .solo .profileData svg.line {
      fill: none;
      stroke: var(--link-color)
    }

    /* Widget Social Media */
    .socialLink {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      margin: 0;
      padding: 0;
      list-style: none
    }

    .socialLink li:not(:last-child) {
      margin-right: 10px
    }

    .socialLink li:first-child {
      margin-left: auto
    }

    .socialLink li:last-child {
      margin-right: auto
    }

    .socialLink li .link {
      display: flex;
      align-items: center
    }

    .socialLink li a {
      opacity: .8
    }

    #LinkList002 {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: calc(var(--nav-width) - var(--nav-border));
      background-color: var(--nav-bg);
      padding: 20px 20px 30px 25px;
      transition: var(--transition-1)
    }

    #LinkList002 ul {
      justify-content: flex-start
    }

    #LinkList002 li:first-child {
      margin-left: 0
    }

    #LinkList002 label {
      display: none;
      align-items: center;
      opacity: 0;
      visibility: hidden
    }

    #mobile-menu {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--nav-bg);
      border-top: var(--nav-border) solid var(--content-border);
      padding: 0 25px;
      border-radius: 0px 0px 0 0;
      box-shadow: 0 5px 15px 0 rgb(0 0 0 / 12%);
      z-index: 1
    }

    #mobile-menu .mobileMenu {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50px;
      margin: 0;
      padding: 0;
      list-style: none
    }

    #mobile-menu .mobileMenu li {
      width: 20%;
      text-align: center
    }

    #mobile-menu .mobileMenu li>* {
      display: inline-flex;
      align-items: center
    }

    #mobile-menu .mobileMenu li>*:hover svg,
    .onHome #mobile-menu .mobileMenu li.mHome svg {
      opacity: .7
    }

    #mobile-menu .mobileMenu li>*:hover svg .fill,
    .onHome #mobile-menu .mobileMenu li.mHome svg .fill {
      fill: var(--nav-icon)
    }

    .darkMode #mobile-menu .mobileMenu li>*:hover svg .fill,
    .darkMode #mobile-menu .mobileMenu li.mDark svg .fill,
    .darkMode.onHome #mobile-menu .mobileMenu li.mHome svg .fill {
      fill: var(--dark-text)
    }

    /* Mobile Menu */
    #mobile-menu {
      display: none
    }

    /* Main Menu */
    .mainInner {
      margin-left: var(--nav-width);
      margin-bottom: 0;
      padding: 25px;
      transition: var(--transition-1);
      position: relative
    }

    .mainMenu {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--nav-width);
      background-color: var(--nav-bg);
      border-right: var(--nav-border) solid var(--content-border);
      font-size: 13px;
      color: var(--nav-text);
      transition: var(--transition-1);
      z-index: 2
    }

    .mainMenu .section {
      padding-top: calc(var(--header-height) + 15px);
      padding-bottom: 90px;
      height: 100%
    }

    .mainMenu .section:hover {
      overflow-y: auto
    }

    .mainMenu .fullClose.menu {
      transition: var(--transition-1)
    }

    .mainMenu svg {
      width: 20px;
      height: 20px;
      fill: var(--nav-icon)
    }

    .mainMenu svg.line {
      fill: none;
      stroke: var(--nav-icon)
    }

    .mainMenu ul {
      margin: 0;
      padding: 0;
      list-style: none
    }

    .htmlMenu>li {
      position: relative
    }

    .htmlMenu>li.break:after {
      content: '';
      display: block;
      width: calc(100% - 50px);
      border-bottom: 1px solid var(--content-border);
      margin: 12px 25px
    }

    .htmlMenu>li li {
      transition: var(--transition-2);
      max-height: 0;
      opacity: 0;
      visibility: hidden
    }

    .htmlMenu>li li a {
      white-space: nowrap;
      display: block;
      position: relative;
      padding: 10px 25px 10px 60px;
      color: inherit;
      opacity: .7
    }

    .htmlMenu .link:before,
    .htmlMenu>li li a:before {
      content: '';
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      display: block;
      background-color: transparent;
      width: 2px;
      border-radius: 0 2px 2px 0
    }

    .htmlMenu .link:hover:before,
    .htmlMenu>li li a:hover:before {
      background-color: var(--link-color);
      opacity: .7
    }

    .htmlMenu .link:hover svg,
    #LinkList002 label:hover svg,
    .socialLink li .link:hover svg {
      fill: var(--link-color)
    }

    .htmlMenu .link:hover svg.line,
    #LinkList002 label:hover svg.line,
    .socialLink li .link:hover svg.line {
      fill: none;
      stroke: var(--link-color)
    }

    .htmlMenu .link {
      white-space: nowrap;
      display: flex;
      align-items: center;
      width: 100%;
      padding: 10px 25px;
      position: relative;
      color: inherit
    }

    .htmlMenu .link svg {
      flex-shrink: 0;
      margin-right: 15px
    }

    .htmlMenu .link svg.down {
      width: 16px;
      height: 16px;
      margin-left: auto;
      margin-right: 0
    }

    .htmlMenu .link .name {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 400
    }

    .htmlMenu a.link:hover,
    .htmlMenu>li li a:hover {
      background-color: var(--transparent-bg)
    }

    .htmlMenu .close {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: calc(var(--nav-width) - var(--nav-border));
      height: var(--header-height);
      background-color: var(--nav-bg);
      display: flex;
      align-items: center;
      transition: var(--transition-1);
      z-index: 2
    }

    .htmlMenu .close .link:before {
      display: none
    }

    .htmlMenu .close .link .name:before {
      content: attr(data-text);
      font-size: 12px;
      opacity: .7
    }

    .htmlMenu .dropMenu:checked~.link svg.down {
      transform: rotate(180deg)
    }

    .htmlMenu .dropMenu:checked~ul li {
      max-height: 40px;
      opacity: 1;
      visibility: visible
    }

    .navInput:checked~.mainWrapper .mainInner,
    .navInput:checked~.mainWrapper footer {
      margin-left: 68px
    }

    .navInput:checked~.mainWrapper .mainMenu {
      width: 68px
    }

    .navInput:checked~.mainWrapper .htmlMenu .close,
    .navInput:checked~.mainWrapper .mainMenu #LinkList002 {
      width: calc(68px - var(--nav-border))
    }

    .navInput:checked~.mainWrapper .mainMenu #LinkList002 ul {
      display: none
    }

    .navInput:checked~.mainWrapper .mainMenu #LinkList002 label {
      display: flex;
      opacity: 1;
      visibility: visible
    }

    .navInput:checked~.mainWrapper .htmlMenu a.link:hover {
      background-color: transparent
    }

    .navInput:checked~.mainWrapper .htmlMenu .link .name,
    .navInput:checked~.mainWrapper .htmlMenu .link svg.down {
      display: none
    }

    .navInput:checked~.mainWrapper .htmlMenu .dropMenu:checked~ul li {
      max-height: 0;
      opacity: 0;
      visibility: hidden
    }

    .navInput:checked~.mainWrapper .htmlMenu>li.break:after {
      width: calc(100% - 45px)
    }

    /* Large Section */
    .largeSection .widget {
      margin-bottom: 30px
    }

    /* blogTitle Section */
    .blogTitle {
      display: flex;
      justify-content: space-between;
      align-items: flex-start
    }

    .blogTitle .postMode {
      display: flex;
      align-items: center;
      font-size: 11px;
      line-height: 20px
    }

    .blogTitle .postMode:before {
      content: 'List';
      margin-right: 8px;
      opacity: .7
    }

    .blogTitle .postMode svg {
      width: 20px;
      height: 20px
    }

    .blogTitle .postMode .svg-2,
    .listMode .blogTitle .postMode .svg-1 {
      display: none
    }

    .listMode .blogTitle .postMode .svg-2 {
      display: block
    }

    .listMode .blogTitle .postMode:before {
      content: 'Grid'
    }

    /* blogContent Section */
    .blogContent .widget .title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 30px;
      font-size: var(--widget-titleSize);
      font-weight: var(--widget-titleWeight);
      font-family: var(--font-body);
      position: relative
    }

    .blogContent .widget .title:after {
      content: '';
      display: block;
      width: 18px;
      position: absolute;
      bottom: -8px;
      border-bottom: var(--widget-titleAfter) solid var(--dark-textAlt)
    }

    .blogContent .widget .title.search {
      font-size: 14px;
      display: block
    }

    .blogContent .widget .title.search:after {
      display: none
    }

    .blogContent .widget .title.search span {
      font-weight: 400;
      font-size: 90%;
      opacity: .7;
      margin-right: 8px
    }

    .blogContent .widget .title.search span:before {
      content: attr(data-text)
    }

    .blogContent .widget .title.search span.home:after {
      content: '/';
      margin-left: 8px
    }

    .blogContent .widget .title svg {
      height: 18px;
      width: 18px;
      opacity: .7
    }

    .blogContent .widget .imgThumb {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      max-width: none;
      max-height: 105%;
      font-size: 12px;
      text-align: center;
      transform: translate(-50%, -50%)
    }

    .blogContent .widget:not(:last-child),
    .blogContent .sidebar>*:not(:last-child) {
      margin-bottom: 50px
    }

    .blogContent .widget input[type=text],
    .blogContent .widget input[type=email],
    .blogContent .widget textarea {
      display: block;
      width: 100%;
      border: 1px solid rgba(230, 230, 230, 1);
      border-radius: 2px;
      outline: 0;
      padding: 15px 15px;
      margin-bottom: 15px
    }

    .blogContent .widget input[type=text]:focus,
    .blogContent .widget input[type=email]:focus,
    .blogContent .widget textarea:focus {
      border-color: var(--body-altColor)
    }

    .blogContent .widget input[type=button],
    .blogContent .widget input[type=submit] {
      display: inline-flex;
      align-items: center;
      margin: 15px 0 0;
      padding: 10px 20px;
      outline: 0;
      border: 0;
      border-radius: 2px;
      color: #fefefe;
      background-color: var(--link-bg);
      font-size: 14px;
      font-family: var(--font-body);
      white-space: nowrap;
      overflow: hidden;
      max-width: 100%
    }

    .blogContent .widget input[type=button]:hover,
    .blogContent .widget input[type=submit]:hover {
      opacity: .7
    }

    .blogContent {
      display: flex;
      flex-wrap: wrap
    }

    .blogContent .mainbar {
      flex: 1 0 calc(100% - 330px);
      width: calc(100% - 330px);
    }

    .blogContent .mainbar {
      margin-right: auto;
      margin-left: auto;
      transition: var(--transition-1)
    }

    .blogContent .mainbar>*:not(:last-child) {
      margin-bottom: 25px;
      padding-bottom: 25px;
      border-bottom: 1px solid var(--content-border)
    }

    .blogContent .mainbar>.no-items {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: 0
    }

    .blogContent .mainbar {
      max-width: 780px
    }

    .blogContent .sidebar {
      max-width: 600px
    }

    .blogContent .sidebar {
      flex: 0 0 330px;
      width: 330px;
      padding-left: 30px
    }

    .blogContent .sidebar #side-sticky {
      position: -webkit-sticky;
      position: sticky;
      top: 75px
    }

    .onPage .blogContent .mainbar,
    .onPage footer .creditInner {
      max-width: var(--page-maxContent);
      margin-left: auto;
      margin-right: auto
    }

    /* blogPosts Section */
    .blogPosts {
      display: flex;
      flex-wrap: wrap;
      position: relative;
      width: calc(100% + 20px);
      left: -10px
    }

    .blogPosts.empty {
      width: 100%;
      left: 0
    }

    .blogPosts.empty~.blogPager {
      justify-content: flex-start
    }

    .blogPosts .hentry {
      display: block;
      position: relative;
      width: calc(33.333% - 20px);
      margin-left: 10px;
      margin-right: 10px;
      margin-bottom: 40px;
      padding-bottom: 38px;
    }

    .blogPosts .hentry.noInfo,
    .blogPosts .hentry.product,
    .blogPosts div.hentry,
    .blogPosts .hentry.noComment {
      padding-bottom: 0
    }

    .blogPosts .hentry.noAd .widget,
    .Blog~.HTML {
      display: none
    }

    .onItem .blogPosts {
      display: block;
      width: 100%;
      left: 0
    }

    .onItem .blogPosts .hentry {
      width: 100%;
      margin-left: 0;
      margin-right: 0;
      margin-bottom: 0;
      padding-bottom: 0
    }

    /* listMode */
    .listMode .blogPosts .hentry {
      width: calc(100% - 20px);
      display: flex;
      align-items: center;
      padding-bottom: 0;
      margin-bottom: 25px
    }

    .listMode .blogPosts div.hentry {
      display: block
    }

    .listMode .blogPosts .postThumbnail {
      margin-bottom: 0
    }

    .listMode .blogPosts .postContent {
      width: calc(100% - (33.333% - 12.5px));
      padding-left: 25px
    }

    .listMode .blogPosts .postTitle {
      font-size: 18px
    }

    .listMode .blogPosts .postEntry.snippet {
      display: none
    }

    .listMode .blogPosts .postEntry.snippet.productPrice {
      display: block
    }

    .listMode .blogPosts .postInfo {
      position: relative
    }

    @media screen and (max-width: 640px) {
      .listMode .blogPosts .hentry {
        flex-direction: row-reverse;
        margin-bottom: 30px
      }

      .listMode .blogPosts .postContent {
        padding-left: 0;
        padding-right: 25px
      }
    }

    @media screen and (max-width: 480px) {
      .listMode .blogPosts .hentry {
        width: calc(100% - 15px)
      }

      .listMode .blogPosts .postThumbnail {
        flex: 0 0 95px
      }

      .listMode .blogPosts .postThumbnail>* {
        padding-top: 100%
      }

      .listMode .blogPosts .postContent {
        width: calc(100% - 95px);
        padding-right: 20px
      }

      .listMode .blogPosts .postTitle,
      .gridLayout.listMode .blogPosts .postTitle {
        font-size: 14px
      }

      .listMode .blogPosts .postHeader {
        margin-bottom: 5px
      }

      .listMode .blogPosts .postInfo {
        margin-top: 15px
      }
    }

    /* gridLayout */
    @media screen and (max-width: 480px) {
      .gridLayout .blogPosts .hentry {
        width: calc(100% - 15px);
        margin-bottom: 0
      }

      .gridLayout .blogPosts .hentry:not(:last-child) {
        margin-bottom: 50px
      }

      .gridLayout .postEntry.snippet,
      .gridLayout .postHeader,
      .gridLayout .postInfo,
      .gridLayout .postLabel.sponsored {
        font-size: 90%
      }

      .gridLayout .postEntry.snippet.productPrice,
      .gridLayout.listMode .blogPosts .postEntry.snippet.productPrice {
        font-size: 14px
      }

      .gridLayout .postTitle {
        font-size: 1.1rem
      }

      .gridLayout.listMode .blogPosts .hentry,
      .gridLayout.listMode .blogPosts .hentry:not(:last-child) {
        margin-bottom: 30px
      }

      .gridLayout.listMode .blogPosts .postEntry.snippet,
      .gridLayout.listMode .blogPosts .postHeader,
      .gridLayout.listMode .blogPosts .postInfo,
      .gridLayout.listMode .blogPosts .postLabel.sponsored {
        font-size: 12px
      }
    }

    /* blogPager */
    .blogPager,
    .postNav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 90%;
      line-height: 20px;
      color: var(--dark-text);
      margin-top: 30px;
      margin-bottom: 0
    }

    .blogPager>*,
    .postNav>* {
      display: flex;
      align-items: center;
      padding: 10px 13px;

    .shareIcon.twitter a {

      left: 0;
      right: 0;
      z-index: 1
    }

    .sharePreview .previewLabel {

    .postToc {
      position: fixed;
      top: 0;
      right: -355px;
      bottom: 0;
      left: 0;
      width: 355px;
      margin-left: auto;
      transition: var(--transition-1);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      z-index: 2
    }

    .tableOfContainer {
      border-style: dotted;
      border-color: #29bdfd;
      width: 100%;
      height: 100%;
      background-color: var(--body-bg);
      transition: var(--transition-1);
      display: flex;
      position: relative;
      z-index: 3
    }

    .tableOfHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px 15px 30px;
      background-color: var(--body-bg);
      font-size: var(--widget-titleSize);
      font-weight: var(--widget-titleWeight);
      position: absolute;
      top: 70px;
      right: 0;
      left: 0;
      z-index: 1;
      transition: inherit
    }

    .tableOfHeader svg {
      width: 20px;
      height: 20px
    }

    .tableOfHeader span:before {
      content: attr(data-text)
    }

    .tableOfIcon {
      width: 55px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--content-bg);
      border-radius: 50px 0 0 50px;
      border: 1px solid var(--content-border);
      border-right: 0;
      box-shadow: 0 10px 20px 0 rgb(30 30 30 / 8%);
      position: absolute;
      top: 10px;
      left: -55px;
      transition: var(--transition-1)
    }

    .tableOfIcon:before {
      content: '';
      display: block;
      width: 12px;
      height: 12px;
      background-color: var(--link-color);
      border: 2px solid var(--content-bg);
      border-radius: 50%;
      position: absolute;
      top: 8px;
      left: 15px

    .tableOfInner {

      padding: 50px 25px 50px 30px;
      width: 100%;
      overflow-y: auto

    .tableOfContent a {

      display: flex

    .tableOfContent ol {
      margin: 0
    }

    .tableOfContent li>a:before {
      opacity: .7
    }

    .tocMenu:checked~.postToc {

    .tocMenu:checked~.postToc .tableOfIcon {

      visibility: hidden

    .darkMode .tableOfContainer,

    .darkMode .tableOfIcon {
      background-color: var(--dark-bgAlt);
      border-color: transparent
    }

    .darkMode .tableOfIcon:before {
      border-color: var(--dark-bgAlt)
    }

    @media screen and (max-width: 896px) {

    /* Accordion */
    .accordion {
      position: relative;
      list-style: none;
      margin: 30px 0 0;
      padding: 0;
      font-size: 14px;
      line-height: 1.7em
    }

    .accordion li {
      width: 100%;
      padding: 18px 0;
      border-bottom: 1px solid var(--content-border)
    }

    .accordion .content {
      margin: 0;
      padding-left: 32px;
      position: relative;
      font-family: var(--font-body);
      overflow: hidden;
      max-height: 0;
      transition: var(--transition-2);
      opacity: .8
    }

    .accordion p:first-child {
      margin-top: 0
    }

    .accordion p:last-child {
      margin-bottom: 0
    }

    .accorTitle {
      display: flex;
      align-items: center;
      font-weight: 900;
      font-family: var(--font-body);
      color: var(--head-color);
      padding: 0 5px
    }

    .accorTitle span {
      flex-grow: 1
    }

    .accorIcon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
      margin-right: 15px;
      position: relative
    }

    .accorIcon:before,
    .accorIcon:after {
      content: '';
      display: block;
      width: 100%;
      height: 2px;
      border-radius: 2px;
      background-color: var(--head-color)
    }

    .accorIcon:after {
      position: absolute;
      transform: rotate(90deg)
    }

    .accorMenu:checked~.accorTitle span {
      color: var(--link-color)
    }

    .accorMenu:checked~.accorTitle .accorIcon:before,
    .accorMenu:checked~.accorTitle .accorIcon:after {
      background-color: var(--link-color)
    }

    .accorMenu:checked~.accorTitle .accorIcon:after {
      visibility: hidden;
      opacity: 0
    }

    .accorMenu:checked~.content {

                  w: w + fx,
                  h: h + fy
                };
              }
              function setFontSize(s) {
                shapeContext.font = 'bold ' + s + 'px ' + fontFamily;
              }
              function isNumber(n) {
                return !isNaN(parseFloat(n)) && isFinite(n);
              }
              function init() {
                fit();
                window.addEventListener('resize', fit);
              }
              init();
              return {
                circle: function (d) {
                  var r = Math.max(0, d) / 2;
                  shapeContext.clearRect(0, 0, shapeCanvas.width, shapeCanvas.height);
                  shapeContext.beginPath();
                  shapeContext.arc(r * gap, r * gap, r * gap, 0, 2 * Math.PI, false);
                  shapeContext.fill();
                  shapeContext.closePath();
                  return processCanvas();
                },
                letter: function (l) {
                  var s = 0;
                  l = String(l);
                  var lines = [];
                  if (l.length > 22 && l.indexOf(' ') > -1) {
                    var words = l.split(' ');
                    var currentLine = words[0];
                    for (var i = 1; i < words.length; i++) {
                      if ((currentLine + " " + words[i]).length > 22) {
                        lines.push(currentLine);
                        currentLine = words[i];
                      } else {
                        currentLine += " " + words[i];
                      }
                    }
                    lines.push(currentLine);
                  } else {
                    lines = [l];
                  }
                  if (lines.length > 1)
                    gap = 11;
                  else {
                    if (l.length <= 5)
                      gap = 13;
                    else if (l.length <= 10)
                      gap = 11;
                    else if (l.length <= 15)
                      gap = 9;
                    else
                      gap = 7;
                  }
                  fit();
                  setFontSize(fontSize);
                  shapeContext.clearRect(0, 0, shapeCanvas.width, shapeCanvas.height);
                  if (lines.length === 1) {
                    var widthRatio = (shapeCanvas.width / shapeContext.measureText(l).width) * 0.9;
                    var heightRatio = (shapeCanvas.height / fontSize) * (isNumber(l) ? 1 : 0.5);
                    s = Math.min(fontSize, widthRatio * fontSize, heightRatio * fontSize);
                    setFontSize(s);
                    shapeContext.fillText(l, shapeCanvas.width / 2, shapeCanvas.height / 2);
                  } else {
                    var maxWidth = 0;
                    lines.forEach(line => {
                      var w = shapeContext.measureText(line).width;
                      if (w > maxWidth)
                        maxWidth = w;
                    }
                    );
                    var totalLines = lines.length;
                    var widthScale = (shapeCanvas.width / maxWidth) * 0.9;
                    var heightScale = (shapeCanvas.height / (fontSize * totalLines * 1.2)) * 0.8;
                    s = Math.min(fontSize, widthScale * fontSize, heightScale * fontSize);
                    setFontSize(s);
                    var lineHeight = s * 1.1;
                    for (var i = 0; i < lines.length; i++) {
                      var y = (shapeCanvas.height / 2) + (i - (totalLines - 1) / 2) * lineHeight;
                      shapeContext.fillText(lines[i], shapeCanvas.width / 2, y);
                    }
                  }
                  return processCanvas();
                },
                rectangle: function (w, h) {
                  var dots = []
                    , width = gap * w
                    , height = gap * h;
                  for (var y = 0; y < height; y += gap) {
                    for (var x = 0; x < width; x += gap) {
                      dots.push(new S.Point({
                        x: x,
                        y: y
                      }));
                    }
                  }
                  return {
                    dots: dots,
                    w: width,
                    h: height
                  };
                }
              };
            }());
            S.Shape = (function () {
              var dots = []
                , width = 0
                , height = 0
                , cx = 0
                , cy = 0;
              function compensate() {
                var a = S.Drawing.getArea();
                cx = a.w / 2 - width / 2;
                cy = a.h / 2 - height / 2;
              }
              return {
                switchShape: function (n, fast) {
                  var size, a = S.Drawing.getArea();
                  width = n.w;
                  height = n.h;
                  compensate();
                  if (n.dots.length > dots.length) {
                    size = n.dots.length - dots.length;
                    for (var d = 1; d <= size; d++) {
                      dots.push(new S.Dot(a.w / 2, a.h / 2));
                    }
                  }
                  var d = 0
                    , i = 0;
                  while (n.dots.length > 0) {
                    i = Math.floor(Math.random() * n.dots.length);
                    dots[d].e = fast ? 0.25 : (dots[d].s ? 0.14 : 0.11);
                    if (dots[d].s) {
                      dots[d].move(new S.Point({
                        z: Math.random() * 20 + 10,
                        a: Math.random(),
                        h: 18
                      }));
                    } else {
                      dots[d].move(new S.Point({
                        z: Math.random() * 5 + 5,
                        h: fast ? 18 : 30
                      }));
                    }
                    dots[d].s = true;
                    dots[d].move(new S.Point({
                      x: n.dots[i].x + cx,
                      y: n.dots[i].y + cy,
                      a: 1,
                      z: 5,
                      h: 0
                    }));
                    n.dots = n.dots.slice(0, i).concat(n.dots.slice(i + 1));
                    d++;
                  }
                  for (var i = d; i < dots.length; i++) {
                    if (dots[i].s) {
                      dots[i].move(new S.Point({
                        z: Math.random() * 20 + 10,
                        a: Math.random(),
                        h: 20
                      }));
                      dots[i].s = false;
                      dots[i].e = 0.04;
                      dots[i].move(new S.Point({
                        x: Math.random() * a.w,
                        y: Math.random() * a.h,
                        a: 0.3,
                        z: Math.random() * 4,
                        h: 0
                      }));
                    }
                  }
                },
                render: function () {
                  for (var d = 0; d < dots.length; d++) {
                    dots[d].render();
                  }
                }
              };
            }());
            S.init();
          </script>
